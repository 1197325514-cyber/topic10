# ===========================================
# Topic 10 - 金融数据分析项目
# GitHub Pages Jekyll 配置
# ===========================================

# 基本信息
title: "Topic 10"
description: "金融数据分析项目"
author: "Topic 10 小组"

# URL 配置
url: "https://1197325514-cyber.github.io"
baseurl: "/topic10"

# 主题
theme: jekyll-theme-minimal

# 插件
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-relative-links

# Markdown 设置
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# 默认布局
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# 排除文件
exclude:
  - ".env"
  - ".env.example"
  - ".gitignore"
  - ".venv"
  - "requirements.txt"
  - "setup.py"
  - "__pycache__"
  - "cache"
  - "output"
  - "*.db"
  - "*.pyc"

# 语言
lang: zh-CN
